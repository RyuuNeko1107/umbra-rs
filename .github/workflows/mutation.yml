name: Mutation

# テスト有効性の退行ガード（tdd-workflow 工程7）。
# solver.rs の Brent/golden 内部ヒューリスティクスは等価変異として
# docs/reviews/mutation-umbra-core.md で許容済みのため除外し、
# 他モジュールで生存変異ゼロ（テストがコードを実効的に検証していること）を要求する。
# cargo-mutants のインストール＋多数の変異実行で重いため、毎 push では回さず週次＋手動。

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1" # 毎週月曜 00:00 UTC

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutants:
    name: cargo-mutants (umbra-core, excl. solver heuristics)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build verification image
        run: docker compose -p umbra-rs build rust
      - name: Mutation test (regression guard)
        # 等価変異を除外（根拠は docs/reviews/mutation-umbra-core.md, mutation-bessel-poly.md）:
        #   - solver.rs: Brent/golden の加速ヒューリスティクス（二分法フォールバックで根は契約通り）
        #   - delta_t_seconds の `< → <=`: 区分多項式が接合点で連続（差 <0.001s ≪ ΔT 不確実性）
        #   - BesselianPolynomial::at の区間端 `< → <=` / `> → >=`: EPS マージン境界の一点のみで差が出る等価変異
        #   - solve_zero_in_window: 粗走査→Brent の求根機構（粗走査の点配置は Brent が真根へ収束するため等価。
        #     docs/reviews/mutation-conjunction.md。solver.rs 除外と同方針）
        #   - assess_eclipse_possibility の `< → <=`: separation==limit ちょうどの一点のみの境界等価変異
        #     （docs/reviews/mutation-eclipse-filter.md）
        #   - scan_point_count: 粗走査の分割数（窓幅/刻み）を決めるだけで、最大食・接触の検出正否には
        #     影響しない（n が十分大きければ括れる）。算術変異は等価（細かい n でも同結果）/timeout（巨大 n）
        #     （docs/reviews/mutation-local-contacts.md, mutation-local-maximum.md。solver.rs 除外と同方針）
        #   - descending_sign_change_bracket: 逆射影の粗走査ブラケット。区間内に根が一意のため刻み・
        #     点配置によらず Brent が同じ真根へ収束する（刻み `/`・符号判定 `*`・関数全体を定数
        #     `Some((0,1))` 等に置換しても [0,~1] が根を含み Brent が精解、外す場合は同符号で再棄却）。
        #     （docs/reviews/mutation-axis-intercept.md。solve_zero_in_window 除外と同方針）
        #   - l2_changes_sign の符号判定 `l2>0`/`l2<0` の `>→>=`/`<→<=`: サンプル点で l2 がちょうど 0.0 の
        #     ときだけ差が出る境界等価変異（連続関数の格子点が厳密零点に当たるのは測度ゼロ＝到達不能）。
        #     （docs/reviews/mutation-global-kind.md。delta_t_seconds の `<=` 除外と同方針）
        #   - xtask::eop（ISSUE-007-EOP）: read_source / verify_against_disk は IO ラッパで CWD 依存・
        #     unit 不能（manifest 相対 include_bytes 回帰 + CLI 統合で実効検証済み）、unpack_records の
        #     `> MAX_EOP_RECORDS` 境界（==/>=）は 1e7 件≒320MB を要する作れない等価変異。
        #     （docs/reviews/mutation-eop.md）
        #   - EclipseEngine::search: 下位ソルバ配線のオーケストレーション。各下位工程は独立に
        #     ミューテーション検証済みで、配線は統合テスト search_finds_2017_08_21_total_eclipse
        #     （≈300s）が縛る。当該テストを毎変異で回すと eclipse 全変異が 300s 超になりガードが
        #     非現実的なため `--skip` でスキップし、それにより撃破できなくなる search の可殺変異
        #     （月半径配線・fit 区間 match arm）も含め search の全変異を除外。実回帰ガードは通常 CI の
        #     `cargo test -p umbra-eclipse`（統合テスト込み）が担う。（docs/reviews/mutation-search.md）
        #   - EclipseEngine::local_circumstances / build_local_contact / contact_local: 局地条件の
        #     オーケストレーション。局地条件テスト群は内部で search を実走し各々 ≈300s のため
        #     `--skip local_circumstances` でスキップ。それにより撃破できなくなる3者の変異を除外
        #     （下位プリミティブと ζ 補正式は独立検証済み・統合テストが配線を縛る。build_local_contact /
        #     contact_local は単体ミューテーション 0 missed）。実回帰ガードは通常 CI の
        #     `cargo test -p umbra-eclipse`（統合テスト込み）が担う。（docs/reviews/mutation-local-circumstances.md）
        run: >-
          docker compose -p umbra-rs run --rm rust
          bash -c "cargo install cargo-mutants --locked && cargo mutants --package umbra-core --package umbra-ephemeris --package umbra-eclipse --package xtask --exclude '**/solver.rs' --exclude-re 'with <= in.*delta_t_seconds' --exclude-re 'with <= in.*BesselianPolynomial>::at' --exclude-re 'with >= in.*BesselianPolynomial>::at' --exclude-re 'in solve_zero_in_window' --exclude-re 'with <= in.*assess_eclipse_possibility' --exclude-re 'in scan_point_count' --exclude-re 'descending_sign_change_bracket' --exclude-re 'with >= in.*l2_changes_sign' --exclude-re 'with <= in.*l2_changes_sign' --exclude-re 'eop.rs.* read_source' --exclude-re 'eop.rs.* verify_against_disk' --exclude-re 'eop.rs.*with == in unpack_records' --exclude-re 'eop.rs.*with >= in unpack_records' --exclude-re 'EclipseEngine<.*>::search' --exclude-re 'EclipseEngine<.*>::local_circumstances' --exclude-re 'EclipseEngine<.*>::build_local_contact' --exclude-re 'EclipseEngine<.*>::contact_local' -- --skip search_finds_2017_08_21_total_eclipse --skip local_circumstances"
