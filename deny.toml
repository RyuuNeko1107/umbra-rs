# cargo-deny: サプライチェーン / ライセンスゲート（ISSUE-046 / data-sources.md §6）。
# GPL 等のコピーレフトは allow-list に載せないことで自動的に拒否される
# （本プロジェクトは GPL のコード・データを取り込まない方針）。

[graph]
all-features = true

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
]

[advisories]
version = 2
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
